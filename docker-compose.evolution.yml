version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    restart: always
    environment:
      - SERVER_URL=https://consolidacao.7pro.tech  # Replace with your actual Coolify assigned domain
      - SERVER_PORT=8080
      - DOCKER_ENV=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=lagoinhazxcvbnm1234  # We will put this in our Python backend later!
      
      # [FIX] Disabling Redis to avoid the infinite disconnect loop bug in v2.2.3
      - REDIS_ENABLED=false
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://postgres:lagoinhapassword@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution-api
    depends_on:
      - evolution-db

  # evolution-redis:
  #   image: redis:7.2-alpine
  #   restart: always
  #   volumes:
  #     - evolution-redis-data:/data

  evolution-db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=lagoinhapassword
      - POSTGRES_DB=evolution
    volumes:
      - evolution-db-data:/var/lib/postgresql/data

volumes:
  evolution-redis-data:
  evolution-db-data:
