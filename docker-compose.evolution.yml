version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=https://consolidacao.7pro.tech  # Replace with your actual Coolify assigned domain
      - SERVER_PORT=8080
      - DOCKER_ENV=true
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=lagoinhazxcvbnm1234  # We will put this in our Python backend later!
      - REDIS_ENABLED=true
      - REDIS_URI=redis://evolution-redis:6379/0
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=postgresql://postgres:lagoinhapassword@evolution-db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution-api
    depends_on:
      - evolution-redis
      - evolution-db

  evolution-redis:
    image: redis:7.2-alpine
    container_name: evolution_redis
    restart: always
    volumes:
      - evolution-redis-data:/data

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=lagoinhapassword
      - POSTGRES_DB=evolution
    volumes:
      - evolution-db-data:/var/lib/postgresql/data

volumes:
  evolution-redis-data:
  evolution-db-data:
