# ──────────────────────────────────────────────────────────────────────────────
# nginx-rate-limit.conf — Zelo Rate Limiting (Fase H)
#
# DEPLOY: This file defines rate limiting zones that must live in nginx's
# http{} context. In Coolify/Docker, add this file to:
#   /etc/nginx/conf.d/rate_limit.conf
# OR include it in the main nginx.conf http{} block.
#
# Usage in server{} block (already referenced in nginx.conf):
#   limit_req zone=hub_general burst=20 nodelay;
#   limit_req zone=hub_forms burst=5 nodelay;
# ──────────────────────────────────────────────────────────────────────────────

# General page access — 60 req/min per IP
limit_req_zone $binary_remote_addr zone=hub_general:10m rate=60r/m;

# Form submission / API routes — 10 req/min per IP (anti-spam)
limit_req_zone $binary_remote_addr zone=hub_forms:10m rate=10r/m;

# Return 429 Too Many Requests instead of default 503
limit_req_status 429;
