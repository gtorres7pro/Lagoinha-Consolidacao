<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — Zelo Pro</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.100.0/dist/umd/supabase.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #030508;
            color: #fff;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .bg-grid {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background-image:
                linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .bg-glow {
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at center, rgba(251,191,36,0.06) 0%, transparent 70%);
        }

        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px;
            display: flex; flex-direction: column; align-items: center; gap: 24px;
            animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(251,191,36,0.3), 0 0 0 1px rgba(251,191,36,0.2);
        }
        .logo svg { width: 26px; height: 26px; color: #000; }

        .headline { text-align: center; }
        .headline h1 { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.05em; line-height: 1.05; }
        .headline p { color: rgba(255,255,255,0.45); font-size: 0.85rem; margin-top: 6px; }

        /* Card */
        .card {
            width: 100%;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 28px 24px;
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column; gap: 16px;
        }

        /* Field */
        .field { display: flex; flex-direction: column; gap: 6px; }
        .label {
            font-size: 0.74rem; font-weight: 700; letter-spacing: 0.06em;
            text-transform: uppercase; color: rgba(255,255,255,0.5);
        }

        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.3); pointer-events: none;
            display: flex; align-items: center;
        }
        .input-icon svg { width: 15px; height: 15px; }

        input[type="text"], input[type="email"] {
            width: 100%; padding: 12px 14px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            color: #fff; font-family: inherit; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
        }
        input[type="text"]:focus, input[type="email"]:focus {
            border-color: rgba(251,191,36,0.5);
            background: rgba(255,255,255,0.07);
        }
        input::placeholder { color: rgba(255,255,255,0.22); }

        /* Phone field — custom, no external lib */
        .phone-row {
            display: flex; gap: 8px; align-items: stretch;
        }
        .country-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 0 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            cursor: pointer; white-space: nowrap;
            font-family: inherit; font-size: 0.88rem;
            color: #fff; transition: border-color 0.2s, background 0.2s;
            flex-shrink: 0; height: 46px;
            position: relative;
        }
        .country-btn:hover, .country-btn.open {
            border-color: rgba(251,191,36,0.5);
            background: rgba(255,255,255,0.08);
        }
        .country-flag { font-size: 1.1rem; line-height: 1; }
        .country-code { font-weight: 700; font-size: 0.82rem; color: rgba(255,255,255,0.7); }
        .country-chevron { font-size: 0.55rem; color: rgba(255,255,255,0.3); margin-left: 2px; }

        /* Dropdown */
        .country-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0;
            width: 240px; max-height: 220px; overflow-y: auto;
            background: #1a1a1f; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; z-index: 100;
            box-shadow: 0 16px 48px rgba(0,0,0,0.7);
            display: none;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        .country-dropdown.open { display: block; animation: dropIn 0.15s ease both; }
        @keyframes dropIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .country-option {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            font-size: 0.84rem; transition: background 0.1s;
        }
        .country-option:hover { background: rgba(251,191,36,0.08); }
        .country-option .opt-flag { font-size: 1rem; }
        .country-option .opt-name { flex: 1; color: rgba(255,255,255,0.8); }
        .country-option .opt-code { color: rgba(255,255,255,0.4); font-size: 0.78rem; font-weight: 600; }

        input#phone-number {
            flex: 1; padding: 12px 14px; height: 46px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            color: #fff; font-family: inherit; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
        }
        input#phone-number:focus {
            border-color: rgba(251,191,36,0.5);
            background: rgba(255,255,255,0.07);
        }

        /* Error box */
        .error-box {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px; padding: 10px 14px;
            color: #fca5a5; font-size: 0.82rem; text-align: center;
            display: none;
        }

        /* Submit button */
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            color: #000; font-family: inherit; font-size: 0.95rem; font-weight: 800;
            border: none; border-radius: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s; margin-top: 4px;
            letter-spacing: -0.01em;
        }
        .btn-submit:hover:not(:disabled) { 
            transform: translateY(-1px); 
            box-shadow: 0 8px 24px rgba(251,191,36,0.35);
        }
        .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

        .spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(0,0,0,0.2);
            border-top-color: #000; border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-link {
            display: block; text-align: center;
            color: rgba(255,255,255,0.4); font-size: 0.83rem;
            text-decoration: none; transition: color 0.2s;
            padding: 4px;
        }
        .login-link:hover { color: #FBBF24; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 5h14L5 19h14"/>
            </svg>
        </div>

        <div class="headline">
            <h1>Iniciar Trial de 7 Dias</h1>
            <p>Junte-se à nova era de gestão de igrejas.</p>
        </div>

        <div class="card">
            <!-- Name -->
            <div class="field">
                <label class="label">Seu Nome Completo</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="reg-name" placeholder="Ex: João da Silva" autocomplete="name">
                </div>
            </div>

            <!-- Church/Workspace -->
            <div class="field">
                <label class="label">Nome da Igreja (Workspace)</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </span>
                    <input type="text" id="reg-church" placeholder="Ex: Igreja Batista Central" autocomplete="organization">
                </div>
            </div>

            <!-- Email -->
            <div class="field">
                <label class="label">E-mail</label>
                <div class="input-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <rect x="2" y="4" width="20" height="16" rx="2"/>
                            <polyline points="2,4 12,13 22,4"/>
                        </svg>
                    </span>
                    <input type="email" id="reg-email" placeholder="seu@email.com" autocomplete="email">
                </div>
            </div>

            <!-- Phone — custom -->
            <div class="field">
                <label class="label">WhatsApp</label>
                <div class="phone-row">
                    <!-- Country selector -->
                    <button type="button" class="country-btn" id="country-btn" onclick="toggleCountryDropdown()">
                        <span class="country-flag" id="sel-flag">🇧🇷</span>
                        <span class="country-code" id="sel-code">+55</span>
                        <span class="country-chevron">▼</span>

                        <!-- Dropdown (inside btn for relative positioning) -->
                        <div class="country-dropdown" id="country-dropdown">
                            <!-- populated by JS -->
                        </div>
                    </button>
                    <!-- Number -->
                    <input type="tel" id="phone-number" placeholder="(11) 99999-9999" autocomplete="tel-national" inputmode="numeric">
                </div>
            </div>

            <div class="error-box" id="reg-error"></div>

            <button class="btn-submit" id="btn-create" onclick="createAccount()">
                <span id="btn-text">Criar Minha Conta Grátis</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>

            <a href="/login.html" class="login-link">Já possui conta? Fazer Login</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://uyseheucqikgcorrygzc.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI';
        const EDGE_URL = 'https://uyseheucqikgcorrygzc.supabase.co/functions/v1';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        // ── Country data ─────────────────────────────────────────────
        const COUNTRIES = [
            { flag:'🇧🇷', name:'Brasil',         code:'+55',  iso:'BR' },
            { flag:'🇺🇸', name:'EUA',             code:'+1',   iso:'US' },
            { flag:'🇵🇹', name:'Portugal',        code:'+351', iso:'PT' },
            { flag:'🇦🇴', name:'Angola',          code:'+244', iso:'AO' },
            { flag:'🇲🇿', name:'Moçambique',      code:'+258', iso:'MZ' },
            { flag:'🇨🇻', name:'Cabo Verde',      code:'+238', iso:'CV' },
            { flag:'🇦🇷', name:'Argentina',       code:'+54',  iso:'AR' },
            { flag:'🇨🇱', name:'Chile',           code:'+56',  iso:'CL' },
            { flag:'🇨🇴', name:'Colômbia',        code:'+57',  iso:'CO' },
            { flag:'🇲🇽', name:'México',          code:'+52',  iso:'MX' },
            { flag:'🇵🇾', name:'Paraguai',        code:'+595', iso:'PY' },
            { flag:'🇺🇾', name:'Uruguai',         code:'+598', iso:'UY' },
            { flag:'🇵🇪', name:'Peru',            code:'+51',  iso:'PE' },
            { flag:'🇧🇴', name:'Bolívia',         code:'+591', iso:'BO' },
            { flag:'🇪🇨', name:'Equador',         code:'+593', iso:'EC' },
            { flag:'🇻🇪', name:'Venezuela',       code:'+58',  iso:'VE' },
            { flag:'🇩🇪', name:'Alemanha',        code:'+49',  iso:'DE' },
            { flag:'🇪🇸', name:'Espanha',         code:'+34',  iso:'ES' },
            { flag:'🇫🇷', name:'França',          code:'+33',  iso:'FR' },
            { flag:'🇬🇧', name:'Reino Unido',     code:'+44',  iso:'GB' },
            { flag:'🇮🇹', name:'Itália',          code:'+39',  iso:'IT' },
            { flag:'🇨🇦', name:'Canadá',          code:'+1',   iso:'CA' },
            { flag:'🇦🇺', name:'Austrália',       code:'+61',  iso:'AU' },
            { flag:'🇯🇵', name:'Japão',           code:'+81',  iso:'JP' },
        ];

        let selectedCountry = COUNTRIES[0]; // Default: Brasil

        function buildDropdown() {
            const dd = document.getElementById('country-dropdown');
            dd.innerHTML = COUNTRIES.map((c, i) => `
                <div class="country-option" onclick="selectCountry(${i}, event)">
                    <span class="opt-flag">${c.flag}</span>
                    <span class="opt-name">${c.name}</span>
                    <span class="opt-code">${c.code}</span>
                </div>
            `).join('');
        }

        function toggleCountryDropdown() {
            const dd = document.getElementById('country-dropdown');
            const btn = document.getElementById('country-btn');
            const isOpen = dd.classList.contains('open');
            dd.classList.toggle('open', !isOpen);
            btn.classList.toggle('open', !isOpen);
        }

        function selectCountry(index, e) {
            e.stopPropagation();
            selectedCountry = COUNTRIES[index];
            document.getElementById('sel-flag').textContent = selectedCountry.flag;
            document.getElementById('sel-code').textContent = selectedCountry.code;
            document.getElementById('country-dropdown').classList.remove('open');
            document.getElementById('country-btn').classList.remove('open');
            document.getElementById('phone-number').focus();
        }

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#country-btn')) {
                document.getElementById('country-dropdown')?.classList.remove('open');
                document.getElementById('country-btn')?.classList.remove('open');
            }
        });

        buildDropdown();

        // ── Form submission ───────────────────────────────────────────
        async function createAccount() {
            const name    = document.getElementById('reg-name').value.trim();
            const church  = document.getElementById('reg-church').value.trim();
            const email   = document.getElementById('reg-email').value.trim();
            const rawNum  = document.getElementById('phone-number').value.trim().replace(/\D/g,'');
            const phone   = selectedCountry.code + rawNum;
            const errBox  = document.getElementById('reg-error');

            errBox.style.display = 'none';

            if (!name || !church || !email || !rawNum) {
                errBox.textContent = 'Por favor, preencha todos os campos.';
                errBox.style.display = 'block';
                return;
            }

            const btn    = document.getElementById('btn-create');
            const text   = document.getElementById('btn-text');
            const spin   = document.getElementById('btn-spinner');
            btn.disabled = true;
            text.style.display = 'none';
            spin.style.display = 'block';

            try {
                const res = await fetch(`${EDGE_URL}/saas-provision-workspace`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_name: name, workspace_name: church, email, phone })
                });

                const data = await res.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Redirect to onboarding, passing credentials via sessionStorage
                sessionStorage.setItem('_reg_slug', data.slug);
                sessionStorage.setItem('_reg_email', email);
                sessionStorage.setItem('_reg_password', data.generated_password);
                sessionStorage.setItem('_reg_name', name);
                sessionStorage.setItem('_reg_workspace', church);

                window.location.href = '/onboarding.html';

            } catch (e) {
                console.error(e);
                errBox.textContent = 'Erro ao criar conta: ' + e.message;
                errBox.style.display = 'block';
                btn.disabled = false;
                text.style.display = 'inline';
                spin.style.display = 'none';
            }
        }

        // Allow Enter key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-create').disabled) {
                createAccount();
            }
        });
    </script>
</body>
</html>
