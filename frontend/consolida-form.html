<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolidação - Lagoinha Orlando</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Intl-Tel-Input CSS for Phone Formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
    
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --accent-color: #FFD700;
            --accent-hover: #e6c200;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #fdfdfd;
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
            padding-bottom: 40px;
        }

        .banner {
            width: 100%;
            height: 200px;
            background: url('banner.jpg') center/cover no-repeat;
            border-bottom: 1px solid var(--accent-color);
        }

        .form-content {
            padding: 0 40px;
            margin-top: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-placeholder {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .logo-placeholder span {
            color: var(--accent-color);
        }

        .lang-select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: border 0.2s;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="email"], input[type="number"], input[type="tel"], select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.15);
        }

        .iti {
            width: 100%;
            display: block;
        }
        .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags.png");}
        @media (min-resolution: 2x) {
            .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags@2x.png");}
        }
        .iti__country-list {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }
        .iti__country:hover {
            background-color: #f1f1f1;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .radio-group { grid-template-columns: 1fr; }
            .container { max-width: 100%; }
            .form-content { padding: 0 24px; }
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
            background: var(--input-bg);
        }

        .radio-option:hover {
            border-color: var(--accent-color);
            background-color: rgba(255, 215, 0, 0.05);
        }

        input[type="radio"] {
            accent-color: var(--accent-color);
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 16px 24px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
            color: var(--text-main);
        }

        .success-overlay.active { opacity: 1; pointer-events: auto; }
        .success-overlay h3 { font-size: 2rem; margin-bottom: 10px; color: var(--text-main); }
        .success-overlay p { color: var(--text-muted); margin-bottom: 20px; font-size: 1.1rem; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Banner Added -->
        <div class="banner"></div>

        <!-- Form Content Area -->
        <div class="form-content">
            <!-- Success Screen -->
            <div class="success-overlay" id="successScreen">
                <h3 data-i18n="success_title" style="color: var(--accent-color); font-size: 2rem;">Obrigado!</h3>
                <p data-i18n="success_sub">Seus dados foram enviados com sucesso.</p>
                <p style="font-weight: 600;"><span data-i18n="redirecting">Redirecionando em</span> <span id="countdown">3</span>...</p>
            </div>

            <div class="header">
            <div class="logo-placeholder">
                <span>⚡</span> <div data-i18n="church_name">Lagoinha Orlando</div>
            </div>
            <select class="lang-select" id="languageSelector" onchange="changeLanguage()">
                <option value="pt" selected>Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>

        <h2 data-i18n="decision_info">Decisão Espiritual</h2>
        
        <form id="visitorForm" onsubmit="handleFormSubmit(event)">

                <select id="decision" required>

                    <option value="Aceitei Jesus pela primeira vez" data-i18n="dec_first" data-val-i18n="dec_first">Aceitei Jesus pela primeira vez</option>
                    <option value="Eu voltei para Jesus, reconciliação" data-i18n="dec_return" data-val-i18n="dec_return">Eu voltei para Jesus, reconciliação</option>
                    <option value="Quero ser membro" data-i18n="dec_member" data-val-i18n="dec_member">Quero ser membro</option>
                </select>
            </div>

            <div class="form-group">
                <label data-i18n="service">Qual culto você está participando? *</label>
                <select id="service" required>
                    <option value="" disabled selected data-i18n="service_select">Selecione o Culto...</option>
                    <option value="Domingo Manhã">Domingo Manhã</option>
                    <option value="Domingo Noite">Domingo Noite</option>
                    <option value="Hope">Hope (Terça)</option>
                    <option value="Fé">Fé (Quarta)</option>
                    <option value="Legacy">Legacy (Sexta)</option>
                    <option value="Rocket">Rocket (Sábado)</option>
                </select>
            </div>

            <h2 data-i18n="personal_info" style="margin-top: 20px;">Informações Pessoais</h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="first_name">Primeiro Nome *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label data-i18n="last_name">Sobrenome *</label>
                    <input type="text" id="lastName" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="age">Idade *</label>
                    <input type="number" id="age" required min="0">
                </div>
                <div class="form-group">
                    <label data-i18n="gender">Sexo *</label>
                    <select id="gender" required>
                        <option value="" disabled selected data-i18n="gender_select">Selecione...</option>
                        <option value="Masculino" data-i18n="gender_m" data-val-i18n="gender_m">Masculino</option>
                        <option value="Feminino" data-i18n="gender_f" data-val-i18n="gender_f">Feminino</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="marital">Estado Civil *</label>
                <select id="maritalStatus" required>
                    <option value="" disabled selected data-i18n="marital_select">Selecione...</option>
                    <option value="Solteiro(a)" data-i18n="single" data-val-i18n="single">Solteiro(a)</option>
                    <option value="Casado(a)" data-i18n="married" data-val-i18n="married">Casado(a)</option>
                    <option value="Divorciado(a)" data-i18n="divorced" data-val-i18n="divorced">Divorciado(a)</option>
                    <option value="Viúvo(a)" data-i18n="widowed" data-val-i18n="widowed">Viúvo(a)</option>
                </select>
            </div>

            <h2 data-i18n="contact_info" style="margin-top: 20px;">Contato e Residência</h2>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="phone">Telefone (WhatsApp) *</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label data-i18n="email">E-mail *</label>
                    <input type="email" id="email" required>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="country">País de Residência *</label>
                <select id="country" required onchange="handleCountryChange()">
                    <option value="" disabled selected data-i18n="country_select">Selecione o País...</option>
                    <option value="US" data-i18n="country_us">Estados Unidos</option>
                    <option value="BR" data-i18n="country_br">Brasil</option>
                    <option value="" disabled>──────────</option>
                    <!-- Exhaustive Standard Country List -->
                    <option value="AF">Afghanistan</option><option value="AL">Albania</option><option value="DZ">Algeria</option><option value="AD">Andorra</option><option value="AO">Angola</option><option value="AR">Argentina</option><option value="AM">Armenia</option><option value="AU">Australia</option><option value="AT">Austria</option><option value="AZ">Azerbaijan</option><option value="BS">Bahamas</option><option value="BH">Bahrain</option><option value="BD">Bangladesh</option><option value="BB">Barbados</option><option value="BY">Belarus</option><option value="BE">Belgium</option><option value="BZ">Belize</option><option value="BJ">Benin</option><option value="BT">Bhutan</option><option value="BO">Bolivia</option><option value="BA">Bosnia and Herzegovina</option><option value="BW">Botswana</option><option value="BN">Brunei</option><option value="BG">Bulgaria</option><option value="BF">Burkina Faso</option><option value="BI">Burundi</option><option value="CV">Cabo Verde</option><option value="KH">Cambodia</option><option value="CM">Cameroon</option><option value="CA">Canada</option><option value="CF">Central African Republic</option><option value="TD">Chad</option><option value="CL">Chile</option><option value="CN">China</option><option value="CO">Colombia</option><option value="KM">Comoros</option><option value="CG">Congo</option><option value="CR">Costa Rica</option><option value="HR">Croatia</option><option value="CU">Cuba</option><option value="CY">Cyprus</option><option value="CZ">Czechia</option><option value="DK">Denmark</option><option value="DJ">Djibouti</option><option value="DM">Dominica</option><option value="DO">Dominican Republic</option><option value="EC">Ecuador</option><option value="EG">Egypt</option><option value="SV">El Salvador</option><option value="GQ">Equatorial Guinea</option><option value="ER">Eritrea</option><option value="EE">Estonia</option><option value="SZ">Eswatini</option><option value="ET">Ethiopia</option><option value="FJ">F ue="MN">Mongolia</option><option value="ME">Montenegro</option><option value="MA">Morocco</option><option value="MZ">Mozambique</option><option value="MM">Myanmar</option><option value="NA">Namibia</option><option value="NR">Nauru</option><option value="NP">Nepal</option><option value="NL">Netherlands</option><option value="NZ">New Zealand</option><option value="NI">Nicaragua</option><option value="NE">Niger</option><option value="NG">Nigeria</option><option value="MK">North Macedonia</option><option value="NO">Norway</option><option value="OM">Oman</option><option value="PK">Pakistan</option><option value="PW">Palau</option><option value="PS">Palestine</option><option value="PA">Panama</option><option value="PG">Papua New Guinea</option><option value="PY">Paraguay</option><option value="PE">Peru</option><option value="PH">Philippines</option><option value="PL">Poland</option><option value="PT">Portugal</option><option value="QA">Qatar</option><option value="RO">Romania</option><option value="RU">Russia</option><option value="RW">Rwanda</option><option value="WS">Samoa</option><option value="SM">San Marino</option><option value="ST">Sao Tome and Principe</option><option value="SA">Saudi Arabia</option><option value="SN">Senegal</option><option value="RS">Serbia</option><option value="SC">Seychelles</option><option value="SL">Sierra Leone</option><option value="SG">Singapore</option><option value="SK">Slovakia</option><option value="SI">Slovenia</option><option value="SB">Solomon Islands</option><option value="SO">Somalia</option><option value="ZA">South Africa</option><option value="ES">Spain</option><option value="LK">Sri Lanka</option><option value="SD">Sudan</option><option value="SR">Suriname</option><option value="SE">Sweden</option><option value="CH">Switzerland</option><option value="SY">Syria</option><option value="TW">Taiwan</option><option value="TJ">Tajikistan</option><option value="TZ">Tanzania</option><option value="TH">Thailand</option><option value="TL">Timor-Leste</option><option value="TG">Togo</option><option value="TO">Tonga</option><option value="TT">Trinidad and Tobago</option><option value="TN">Tunisia</option><option value="TR">Turkey</option><option value="TM">Turkmenistan</option><option value="TV">Tuvalu</option><option value="UG">Uganda</option><option value="UA">Ukraine</option><option value="AE">United Arab Emirates</option><option value="GB">United Kingdom</option><option value="UY">Uruguay</option><option value="UZ">Uzbekistan</option><option value="VU">Vanuatu</option><option value="VE">Venezuela</option><option value="VN">Vietnam</option><option value="YE">Yemen</option><option value="ZM">Zambia</option><option value="ZW">Zimbabwe</option>
                </select>
            </div>

            <!-- Enhanced Address Area -->
            <div class="form-group">
                <label data-i18n="address">Endereço (Rua, Número) *</label>
                <input type="text" id="address" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="zip">CEP / Zip Code *</label>
                    <input type="text" id="zip" required>
                </div>
                <div class="form-group">
                    <label data-i18n="apt">Apto / Casa / Compl. (Opcional)</label>
                    <input type="text" id="apt">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="city">Cidade *</label>
                    <input type="text" id="city" required>
                </div>
                <!-- Dynamic State Selects Hardcoded for stability -->
                <div class="form-group">
                    <label data-i18n="state">Estado / Província *</label>
                    <div id="state-wrapper">
                        <!-- US States -->
                        <select id="state-us" style="display: none;">
                            <option value="" disabled selected data-i18n="state_select">Selecione o Estado...</option>
                            <option value="AL">Alabama</option><option value="AK">Alaska</option><option value="AZ">Arizona</option><option value="AR">Arkansas</option><option value="CA">California</option><option value="CO">Colorado</option><option value="CT">Connecticut</option><option value="DE">Delaware</option><option value="FL">Florida</option><option value="GA">Georgia</option><option value="HI">Hawaii</option><option value="ID">Idaho</option><option value="IL">Illinois</option><option value="IN">Indiana</option><option value="IA">Iowa</option><option value="KS">Kansas</option><option value="KY">Kentucky</option><option value="LA">Louisiana</option><option value="ME">Maine</option><option value="MD">Maryland</option><option value="MA">Massachusetts</option><option value="MI">Michigan</option><option value="MN">Minnesota</option><option value="MS">Mississippi</option><option value="MO">Missouri</option><option value="MT">Montana</option><option value="NE">Nebraska</option><option value="NV">Nevada</option><option value="NH">New Hampshire</option><option value="NJ">New Jersey</option><option value="NM">New Mexico</option><option value="NY">New York</option><option value="NC">North Carolina</option><option value="ND">North Dakota</option><option value="OH">Ohio</option><option value="OK">Oklahoma</option><option value="OR">Oregon</option><option value="PA">Pennsylvania</option><option value="RI">Rhode Island</option><option value="SC">South Carolina</option><option value="SD">South Dakota</option><option value="TN">Tennessee</option><option value="TX">Texas</option><option value="UT">Utah</option><option value="VT">Vermont</option><option value="VA">Virginia</option><option value="WA">Washington</option><option value="WV">West Virginia</option><option value="WI">Wisconsin</option><option value="WY">Wyoming</option>

            </div>

            <h2 data-i18n="additional_info" style="margin-top: 20px;">Informação Adicional</h2>

            <div class="form-group">
                <label data-i18n="baptized">Você é Batizado? *</label>
                <div class="radio-group" id="radio-baptized">
                    <label class="radio-option"><input type="radio" name="baptized" value="Católico" data-val-i18n="bap_catholic" required> <span data-i18n="bap_catholic">Católico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Evangélico" data-val-i18n="bap_christian"> <span data-i18n="bap_christian">Evangélico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Quero me batizar" data-val-i18n="bap_want"> <span data-i18n="bap_want">Quero me Batizar</span></label>

                </div>
            </div>

            <div class="form-group" style="margin-top: 24px;">
                <label data-i18n="gc">Você participa de um GC (Small Group)? *</label>
                <div class="radio-group" id="radio-gc">
                    <label class="radio-option"><input type="radio" name="gc" value="Sim" data-val-i18n="gc_yes" required> <span data-i18n="gc_yes">Sim</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Quero participar" data-val-i18n="gc_want"> <span data-i18n="gc_want">Quero participar</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Não" data-val-i18n="gc_no"> <span data-i18n="gc_no">Não</span></label>
                </div>

        function changeLanguage() {
            try {
                const lang = document.getElementById('languageSelector').value;
                const t = translations[lang];

                // 1. Text Labels (Robust loop, never crashes)
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        el.innerText = t[key];
                    }
                });

                // 2. Values (for dropdowns and radios to save english to db)
                document.querySelectorAll('[data-val-i18n]').forEach(el => {
                    const key = el.getAttribute('data-val-i18n');
                    if (t[key]) {
                        el.value = t[key];
                    }
                });
                
                // 3. Placeholders
                const stateText = document.getElementById('state-text');
                if(stateText) stateText.placeholder = t.state_text_ph;
                
            } catch(e) {
                console.error("Translation Engine Warning: ", e);
            }
        }
        
        // -- Country Logic --
        function handleCountryChange() {
            try {
                const country = document.getElementById('country').value;
                const stateText = document.getElementById('state-text');
                const stateUS = document.getElementById('state-us');
                const stateBR = document.getElementById('state-br');

                // Hide all
                stateText.style.display = 'none'; stateText.required = false; stateText.value = "";
                stateUS.style.display = 'none'; stateUS.required = false; stateUS.value = "";
                stateBR.style.display = 'none'; stateBR.required = false; stateBR.value = "";

                if (country === 'US') {
                    stateUS.style.display = 'block';
                    stateUS.required = true;
                } else if (country === 'BR') {
                    stateBR.style.display = 'block';
                    stateBR.required = true;
                } else {
                    stateText.style.display = 'block';
                    stateText.required = true;
                }
            } catch (e) { console.error("Country Logic Warning: ", e); }
        }
