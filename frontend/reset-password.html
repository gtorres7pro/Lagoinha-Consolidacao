<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23FBBF24'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-weight='900' font-size='40' fill='%23000'%3EZ%3C/text%3E%3C/svg%3E">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — Zelo</title>
    <link rel="stylesheet" href="/hub.css">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100dvh; padding: 24px; overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 28px;
            animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(251,191,36,0.25), 0 0 0 1px rgba(251,191,36,0.2);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .logo:hover { transform: scale(1.08) rotate(-3deg); }
        .logo svg { width: 28px; height: 28px; color: #000; }
        .headline { text-align: center; }
        .headline h1 { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.05em; }
        .headline p { color: var(--text-muted); font-size: 0.84rem; font-weight: 500; margin-top: 6px; }
        .card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px; padding: 32px 28px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 18px;
            backdrop-filter: blur(20px);
        }
        .field-group { display: flex; flex-direction: column; gap: 7px; }
        .hub-input {
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid transparent !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .hub-input:hover { border-color: rgba(251,191,36,0.1) !important; }
        .hub-input:focus { border-color: rgba(251,191,36,0.4) !important; box-shadow: 0 0 0 3px rgba(251,191,36,0.08) !important; }
        /* Password strength */
        .strength-bar {
            height: 3px; border-radius: 2px; width: 100%;
            background: rgba(255,255,255,0.06); margin-top: 6px; overflow: hidden;
        }
        .strength-fill {
            height: 100%; border-radius: 2px; width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .strength-label {
            font-size: 0.67rem; color: var(--text-dim); margin-top: 4px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .btn-submit {
            position: relative; width: 100%; padding: 14px;
            background: var(--accent); color: #000;
            font-family: var(--font); font-size: 0.9rem; font-weight: 800;
            border: none; border-radius: 12px; cursor: pointer;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .btn-submit::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
            background-size: 200% 100%; background-position: 200% center;
            transition: background-position 0.5s;
        }
        .btn-submit:hover::after { background-position: -200% center; }
        .btn-submit:hover { background: #F59E0B; box-shadow: 0 4px 16px rgba(251,191,36,0.15); transform: translateY(-1px); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .msg-box { border-radius: 10px; padding: 11px 14px; font-size: 0.83rem; display: none; }
        .msg-box.success { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: #4ade80; display: block; }
        .msg-box.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #f87171; display: block; }
        .footer-note { font-size: 0.7rem; color: var(--text-dim); text-align: center; }
        @media (max-width: 440px) { .card { padding: 24px 18px; } .headline h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div class="hub-glow"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 5 h14 l-14 14 h14"/>
            </svg>
        </div>

        <div class="headline">
            <h1>Nova Senha</h1>
            <p>Escolha uma senha segura para sua conta</p>
        </div>

        <div class="card">
            <div class="field-group">
                <label class="hub-label" for="password">Nova Senha</label>
                <input class="hub-input" type="password" id="password"
                    placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" autofocus>
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-label" id="strength-label"></div>
            </div>
            <div class="field-group">
                <label class="hub-label" for="confirm">Confirmar Senha</label>
                <input class="hub-input" type="password" id="confirm" placeholder="Digite novamente">
            </div>
            <div class="msg-box" id="msg-box"></div>
            <button class="btn-submit" id="save-btn" onclick="savePassword()">
                <span id="btn-text">Salvar Nova Senha</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>

        <p class="footer-note">Acesso restrito à equipe pastoral</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL  = 'https://uyseheucqikgcorrygzc.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                console.log('Recovery session active');
            }
        });

        function checkStrength(pw) {
            const fill  = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            let score = 0;
            if (pw.length >= 8)         score++;
            if (/[A-Z]/.test(pw))       score++;
            if (/[0-9]/.test(pw))       score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const colors = ['#f87171','#fb923c','#FBBF24','#4ade80'];
            const labels = ['Fraca','Moderada','Boa','Forte'];
            fill.style.width  = (score * 25) + '%';
            fill.style.background = colors[score-1] || 'rgba(255,255,255,0.1)';
            label.textContent = pw.length ? (labels[score-1] || '') : '';
            label.style.color = colors[score-1] || 'var(--text-dim)';
        }

        async function savePassword() {
            const pw      = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn     = document.getElementById('save-btn');
            const text    = document.getElementById('btn-text');

            if (pw.length < 8)   { showMsg('A senha deve ter ao menos 8 caracteres.','error'); return; }
            if (pw !== confirm)   { showMsg('As senhas não coincidem.','error'); return; }

            btn.disabled = true;
            text.textContent = 'Salvando...';

            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) {
                showMsg('❌ ' + error.message, 'error');
                btn.disabled = false; text.textContent = 'Salvar Nova Senha';
            } else {
                showMsg('✅ Senha atualizada! Redirecionando...', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 2000);
            }
        }

        function showMsg(text, type) {
            const m = document.getElementById('msg-box');
            m.textContent = text; m.className = 'msg-box ' + type;
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') savePassword(); });
    </script>
</body>
</html>
