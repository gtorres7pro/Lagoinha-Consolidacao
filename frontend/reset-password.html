<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha — Lagoinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFD700; --bg: #0a0a0a; --card: #141414; --border: rgba(255,255,255,0.08); --text-dim: #666; --font: 'Outfit', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }
        body { background: var(--bg); color: #fff; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .wrap { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
        .logo { font-size: 2.8rem; }
        .headline { text-align: center; }
        .headline h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .headline p { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .field input { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 0.95rem; font-family: var(--font); outline: none; transition: border-color 0.2s; width: 100%; }
        .field input:focus { border-color: rgba(255,215,0,0.5); }
        .btn-cta { width: 100%; padding: 13px; background: var(--accent); color: #000; font-weight: 800; font-size: 0.95rem; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font); transition: background 0.2s; }
        .btn-cta:hover { background: #e6c200; }
        .btn-cta:disabled { opacity: 0.5; }
        .msg-box { border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; display: none; }
        .msg-box.success { background: rgba(80,200,80,0.1); border: 1px solid rgba(80,200,80,0.3); color: #6ddc6d; display: block; }
        .msg-box.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff7070; display: block; }
        .strength-bar { height: 4px; border-radius: 2px; width: 100%; background: #1a1a1a; margin-top: 4px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.3s, background 0.3s; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">✦</div>
        <div class="headline">
            <h1>Sua nova senha</h1>
            <p>Escolha uma senha segura para sua conta</p>
        </div>
        <div class="card">
            <div class="field">
                <label>Nova senha</label>
                <input type="password" id="password" placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" autofocus>
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            </div>
            <div class="field">
                <label>Confirmar senha</label>
                <input type="password" id="confirm" placeholder="Digite novamente">
            </div>
            <div class="msg-box" id="msg-box"></div>
            <button class="btn-cta" id="save-btn" onclick="savePassword()">Salvar nova senha</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ttkvpohaxriisulwirqk.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0a3Zwb2hheHJpaXN1bHdpcnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIyMjA0NTUsImV4cCI6MjA1Nzc5NjQ1NX0.1f0KKtPbFBhLMvCm5LMjW5RVEEB8nt0mHh7hFkCdZuM';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        // Supabase puts the access_token in URL hash after redirect
        sb.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                // User is authenticated with a recovery token — ready to update password
                console.log('Recovery session active');
            }
        });

        function checkStrength(pw) {
            const fill = document.getElementById('strength-fill');
            let score = 0;
            if (pw.length >= 8) score++;
            if (/[A-Z]/.test(pw)) score++;
            if (/[0-9]/.test(pw)) score++;
            if (/[^A-Za-z0-9]/.test(pw)) score++;
            const colors = ['#ff5555', '#ff9900', '#FFD700', '#6ddc6d'];
            fill.style.width = (score * 25) + '%';
            fill.style.background = colors[score - 1] || '#333';
        }

        async function savePassword() {
            const pw = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const btn = document.getElementById('save-btn');

            if (pw.length < 8) { showMsg('A senha deve ter ao menos 8 caracteres.', 'error'); return; }
            if (pw !== confirm) { showMsg('As senhas não coincidem.', 'error'); return; }

            btn.disabled = true; btn.textContent = 'Salvando...';
            const { error } = await sb.auth.updateUser({ password: pw });
            if (error) {
                showMsg('❌ ' + error.message, 'error');
                btn.disabled = false; btn.textContent = 'Salvar nova senha';
            } else {
                showMsg('✅ Senha atualizada! Redirecionando...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 2000);
            }
        }

        function showMsg(text, type) {
            const m = document.getElementById('msg-box');
            m.textContent = text; m.className = 'msg-box ' + type;
        }
    </script>
</body>
</html>
