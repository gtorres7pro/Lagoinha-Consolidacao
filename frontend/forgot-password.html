<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a Senha — Zelo Pro</title>
    <link rel="stylesheet" href="/hub.css">
    <style>
        body {
            display: flex; align-items: center; justify-content: center;
            min-height: 100dvh; padding: 24px; overflow: hidden;
        }
        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(251,191,36,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251,191,36,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center; gap: 28px;
            animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }
        .logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #FBBF24, #F59E0B);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 32px rgba(251,191,36,0.25), 0 0 0 1px rgba(251,191,36,0.2);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .logo:hover { transform: scale(1.08) rotate(-3deg); }
        .logo svg { width: 28px; height: 28px; color: #000; }
        .headline { text-align: center; }
        .headline h1 { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.05em; }
        .headline p { color: var(--text-muted); font-size: 0.84rem; font-weight: 500; margin-top: 6px; }
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 24px; padding: 32px 28px; width: 100%;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 18px;
        }
        .field-group { display: flex; flex-direction: column; gap: 7px; }
        .hub-input-wrap { position: relative; }
        .hub-input-wrap .hub-input { padding-left: 44px; }
        .hub-input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-dim); pointer-events: none;
            display: flex; align-items: center; transition: color 0.2s;
        }
        .hub-input-icon svg { width: 16px; height: 16px; }
        .hub-input-wrap:focus-within .hub-input-icon { color: var(--accent); }
        .btn-submit {
            position: relative; width: 100%; padding: 14px;
            background: var(--accent); color: #000;
            font-family: var(--font); font-size: 0.9rem; font-weight: 800;
            border: none; border-radius: 12px; cursor: pointer;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .btn-submit::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
            background-size: 200% 100%; background-position: 200% center;
            transition: background-position 0.5s;
        }
        .btn-submit:hover::after { background-position: -200% center; }
        .btn-submit:hover { background: #F59E0B; box-shadow: 0 4px 24px rgba(251,191,36,0.3); transform: translateY(-1px); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-submit svg { width: 16px; height: 16px; transition: transform 0.2s; }
        .btn-submit:hover svg { transform: translateX(3px); }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        .back-link {
            background: none; border: none; color: var(--text-muted);
            font-family: var(--font); font-size: 0.82rem; font-weight: 500;
            cursor: pointer; text-align: center; transition: color 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .back-link:hover { color: var(--text); }
        .back-link svg { width: 14px; height: 14px; }
        /* Success state */
        .success-card {
            display: none; flex-direction: column; align-items: center; gap: 16px;
            text-align: center;
        }
        .success-icon {
            width: 56px; height: 56px;
            background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            animation: scaleIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .success-icon svg { width: 26px; height: 26px; color: #4ade80; }
        .footer-note { font-size: 0.7rem; color: var(--text-dim); text-align: center; }
    </style>
</head>
<body>
    <div class="hub-glow"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
        </div>

        <div class="headline">
            <h1>Redefinir Senha</h1>
            <p>Enviaremos um link para o seu e-mail</p>
        </div>

        <div class="card">
            <!-- Form state -->
            <div id="form-state">
                <div class="field-group">
                    <label class="hub-label" for="email">E-mail</label>
                    <div class="hub-input-wrap">
                        <span class="hub-input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <polyline points="2,4 12,13 22,4"/>
                            </svg>
                        </span>
                        <input class="hub-input" type="email" id="email"
                            placeholder="seu@email.com" autocomplete="email" autofocus>
                    </div>
                </div>
                <div class="hub-error" id="error-msg" style="margin-top:4px"></div>
                <button class="btn-submit hub-ripple" id="send-btn" onclick="sendReset()" style="margin-top: 4px;">
                    <span id="btn-text">Enviar Link</span>
                    <div class="spinner" id="btn-spinner"></div>
                    <svg id="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>

            <!-- Success state -->
            <div class="success-card" id="success-state">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <div>
                    <p style="font-weight:700; font-size:1rem; margin-bottom:6px;">E-mail enviado!</p>
                    <p style="color:var(--text-muted); font-size:0.83rem; line-height:1.5;">Verifique sua caixa de entrada e siga as instruções para redefinir sua senha.</p>
                </div>
            </div>
        </div>

        <button class="back-link" onclick="goBack()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Voltar ao login
        </button>

        <p class="footer-note">Acesso restrito à equipe pastoral</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const sb = supabase.createClient(
            'https://uyseheucqikgcorrygzc.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI'
        );
        const _slug = window.location.pathname.split('/').filter(Boolean)[0] || 'orlando';

        function goBack() { window.location.href = '/' + _slug + '/login.html'; }

        async function sendReset() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('send-btn');
            const err = document.getElementById('error-msg');

            if (!email) {
                err.textContent = 'Por favor insira seu e-mail.';
                err.classList.add('show'); return;
            }

            btn.disabled = true;
            document.getElementById('btn-text').textContent = 'Enviando...';
            document.getElementById('btn-spinner').style.display = 'block';
            document.getElementById('btn-arrow').style.display = 'none';
            err.classList.remove('show');

            const { error } = await sb.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/' + _slug + '/update-password.html'
            });

            if (error) {
                err.textContent = error.message;
                err.classList.add('show');
                btn.disabled = false;
                document.getElementById('btn-text').textContent = 'Enviar Link';
                document.getElementById('btn-spinner').style.display = 'none';
                document.getElementById('btn-arrow').style.display = 'block';
            } else {
                document.getElementById('form-state').style.display = 'none';
                const sc = document.getElementById('success-state');
                sc.style.display = 'flex';
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });
    </script>
</body>
</html>
