<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci minha senha — Lagoinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FFD700; --bg: #0a0a0a; --card: #141414; --border: rgba(255,255,255,0.08); --text-dim: #666; --font: 'Outfit', sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font); }
        body { background: var(--bg); color: #fff; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .wrap { width: 100%; max-width: 380px; display: flex; flex-direction: column; align-items: center; gap: 28px; }
        .logo { font-size: 2.8rem; }
        .headline { text-align: center; }
        .headline h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        .headline p { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; line-height: 1.5; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
        .field input { background: #0a0a0a; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 0.95rem; font-family: var(--font); outline: none; transition: border-color 0.2s; width: 100%; }
        .field input:focus { border-color: rgba(255,215,0,0.5); }
        .btn-cta { width: 100%; padding: 13px; background: var(--accent); color: #000; font-weight: 800; font-size: 0.95rem; border: none; border-radius: 8px; cursor: pointer; font-family: var(--font); transition: background 0.2s; }
        .btn-cta:hover { background: #e6c200; }
        .btn-cta:disabled { opacity: 0.5; }
        .back-link { font-size: 0.82rem; color: var(--text-dim); cursor: pointer; background: none; border: none; font-family: var(--font); text-decoration: underline; }
        .msg-box { border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; display: none; }
        .msg-box.success { background: rgba(80,200,80,0.1); border: 1px solid rgba(80,200,80,0.3); color: #6ddc6d; display: block; }
        .msg-box.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff7070; display: block; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="logo">✦</div>
        <div class="headline">
            <h1>Recuperar senha</h1>
            <p>Digite seu email e enviaremos<br>um link para redefinir sua senha.</p>
        </div>
        <div class="card">
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="seu@email.com" autofocus>
            </div>
            <div class="msg-box" id="msg-box"></div>
            <button class="btn-cta" id="send-btn" onclick="sendReset()">Enviar link de reset</button>
            <button class="back-link" onclick="window.location.href='login.html'">← Voltar ao login</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uyseheucqikgcorrygzc.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        async function sendReset() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('send-btn');
            const msg = document.getElementById('msg-box');
            if (!email) { showMsg('Digite seu email.', 'error'); return; }
            btn.disabled = true; btn.textContent = 'Enviando...';
            const redirectTo = window.location.origin + '/reset-password.html';
            const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo });
            if (error) {
                showMsg('❌ ' + error.message, 'error');
                btn.disabled = false; btn.textContent = 'Enviar link de reset';
            } else {
                showMsg('✅ Link enviado! Verifique seu email.', 'success');
                btn.textContent = 'Link enviado ✓';
            }
        }
        function showMsg(text, type) {
            const m = document.getElementById('msg-box');
            m.textContent = text; m.className = 'msg-box ' + type;
        }
        document.addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });
    </script>
</body>
</html>
