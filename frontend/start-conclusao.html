<!DOCTYPE html>
<html lang="pt-PT" class="public-form-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Conclusão Presencial - Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
    <link rel="stylesheet" href="/public-form.css?v=20260502">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.100.0/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/intlTelInput.min.js"></script>
    <link rel="stylesheet" href="/index.css">
    <style>
        :root {
            color-scheme: dark;
            --primary: #FFD700;
            --primary-glow: rgba(255, 215, 0, 0.4);
            --bg-dark: #07090f;
            --bg-input: rgba(0,0,0,0.2);
            --text: #ffffff;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.06);
            --text-dim: rgba(255, 255, 255, 0.6);
            --public-form-bg: #07090f;
            --public-form-surface-bg: rgba(13, 17, 23, 0.6);
            --public-form-input-bg: rgba(0,0,0,0.2);
            --public-form-menu-bg: #0d1117;
            --public-form-accent: #FFD700;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: var(--bg-dark); 
            color: #fff; 
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Animated Background Orbs */
        .bg-orbs {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at center, #0B111A 0%, #030407 100%);
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 40vw; height: 40vw; background: rgba(255, 215, 0, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 50vw; height: 50vw; background: rgba(15, 23, 42, 0.8); bottom: -20%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 30vw; height: 30vw; background: rgba(255, 215, 0, 0.08); top: 40%; left: 50%; transform: translateX(-50%); animation-duration: 25s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        .auth-card { 
            background: rgba(13, 17, 23, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; width: 100%; margin: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            position: relative; overflow: hidden;
            z-index: 1;
        }
        .auth-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
        }

        .auth-title { font-size: 1.8rem; font-weight: 800; margin: 0 0 10px; color: var(--primary); letter-spacing: -0.5px; }
        .auth-subtitle { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 30px; }
        
        button.btn { padding: 14px 24px; border-radius: 12px; border: none; font-weight: 700; font-family: 'Outfit'; cursor: pointer; transition: 0.3s; width: 100%; font-size: 1.05rem; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        button.primary { background: var(--primary); color: #000; box-shadow: 0 4px 15px var(--primary-glow); }
        button.primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        button.primary:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); transform: none; box-shadow: none; cursor: not-allowed; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2f3640; color: #fff; padding: 14px 24px; border-radius: 30px; font-weight: 600; font-size: 0.9rem; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .toast.show { opacity: 1; bottom: 40px; }
        .toast.error { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
        .toast.success { background: #dcfce7; color: #166534; border-color: #86efac; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
        .input-light { 
            width: 100%; padding: 14px 16px; border-radius: 12px; font-family: 'Outfit'; font-size: 1rem;
            background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: #fff;
            transition: all 0.3s;
        }
        .input-light:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.4); box-shadow: 0 0 0 4px rgba(255,215,0,0.1); }
        .input-light::placeholder { color: rgba(255,255,255,0.2); }

        /* intl-tel-input overrides */
        .iti { width: 100%; display: block; }
        .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags.png");}
        @media (min-resolution: 2x) { .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags@2x.png");}}
        .iti__country-list { background-color: #0d1117; border: 1px solid var(--border); color: #fff; border-radius: 12px; overflow: hidden; font-family: 'Outfit'; z-index: 99999; }
        .iti__country-list li:hover { background-color: rgba(255,255,255,0.1); }
        .iti__selected-flag { border-top-left-radius: 12px; border-bottom-left-radius: 12px; padding: 0 16px; transition: 0.2s; }
        .iti__selected-flag:hover { background-color: rgba(255,255,255,0.05); }
        .iti__selected-dial-code { color: #fff; }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-card" id="form-container">
        <h2 class="auth-title">O Passo da Fé</h2>
        <p class="auth-subtitle">Registre sua conclusão do Módulo Start presencial.</p>
        
        <div class="input-group">
            <label>Seu Email de Cadastro</label>
            <input type="email" id="auth-email" class="input-light" placeholder="exemplo@email.com">
        </div>

        <div id="new-fields" style="display:none; margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 24px;">
            <p style="font-size:0.9rem; color:#FBBF24; font-weight:600; margin-bottom:20px;">Primeira vez aqui? Crie seu cadastro rápido para concluir.</p>
            
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="auth-name" class="input-light" placeholder="Seu nome">
            </div>
            
            <div class="input-group">
                <label>Telefone (WhatsApp)</label>
                <input type="tel" id="auth-phone" class="input-light">
            </div>
        </div>
        
        <button class="btn primary" onclick="submitPresentialCompletion()" id="btn-submit">Registrar Conclusão</button>
        
        <p style="margin-top:20px; font-size:0.8rem; color:rgba(255,255,255,0.6);">Ao submeter, você confirma ter participado do módulo Start integralmente.</p>
    </div>

    <div id="toast" class="toast">Mensagem</div>

    <script src="/hub-router.js"></script>
    <script>
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let _workspaceId = null;
        let pPhoneIti = null;
        let isNewUserFlow = false;

        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + type;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        async function init() {
            _workspaceId = await HubRouter.getWorkspaceId();
            if (!_workspaceId) { alert("Workspace não encontrado na URL."); }

            // Remove initialization here. We will initialize when container displays.
        }

        async function submitPresentialCompletion() {
            const email = document.getElementById('auth-email').value.trim();
            if (!email) { showToast('Por favor, digite seu email.', 'error'); return; }
            
            const nameField = document.getElementById('auth-name').value.trim();
            const phoneField = pPhoneIti ? pPhoneIti.getNumber() : '';

            if (isNewUserFlow && !nameField) {
                showToast('Nome é obrigatório para novo cadastro.', 'error');
                return;
            }
            if (isNewUserFlow && (!phoneField || (pPhoneIti && !pPhoneIti.isValidNumber()))) {
                showToast('Telefone é obrigatório e precisa ser válido.', 'error');
                return;
            }

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            
            try {
                let participantId = null;

                if (!isNewUserFlow) {
                    // Try to find
                    const { data: pData } = await sb.from('start_participants')
                        .select('id, name')
                        .eq('workspace_id', _workspaceId)
                        .ilike('email', email)
                        .maybeSingle();
                        
                    if (pData) {
                        participantId = pData.id;
                    } else {
                        // Check leads
                        const { data: leadData } = await sb.from('leads')
                            .select('id, name, phone, type')
                            .eq('workspace_id', _workspaceId)
                            .ilike('email', email)
                            .maybeSingle();
                            
                        if (leadData) {
                            const { data: newP, error } = await sb.from('start_participants').insert({
                                workspace_id: _workspaceId,
                                lead_id: leadData.id,
                                name: leadData.name,
                                email: email,
                                phone: leadData.phone,
                                source: leadData.type === 'visitor' ? 'visitor' : 'consolidation'
                            }).select().single();
                            if (error) throw error;
                            participantId = newP.id;
                        } else {
                            // Prompt new user flow
                            isNewUserFlow = true;
                            document.getElementById('new-fields').style.display = 'block';
                            
                            // Initialize phone only when it becomes visible so widths calculate correctly
                            if (!pPhoneIti) {
                                const pPhoneInput = document.querySelector("#auth-phone");
                                pPhoneIti = window.intlTelInput(pPhoneInput, {
                                    initialCountry: "pt",
                                    preferredCountries: ["pt", "br", "us", "es", "gb", "fr", "de", "it"],
                                    separateDialCode: true,
                                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/utils.js",
                                });
                            }

                            btn.textContent = 'Criar Cadastro e Concluir';
                            btn.disabled = false;
                            showToast('Email não encontrado. Preencha seus dados rápidos para concluir!', 'success');
                            return;
                        }
                    }
                } else {
                    // Creating brand new participant
                    const { data: newP, error } = await sb.from('start_participants').insert({
                        workspace_id: _workspaceId,
                        name: nameField,
                        email: email,
                        phone: phoneField,
                        source: 'new'
                    }).select().single();
                    if (error) throw error;
                    participantId = newP.id;
                }
                
                // Save Completion
                btn.textContent = 'Registrando...';
                
                const { error: compErr } = await sb.from('start_completions').upsert({
                    participant_id: participantId,
                    workspace_id: _workspaceId,
                    completion_type: 'presential',
                    completed_at: new Date().toISOString()
                }, { onConflict: 'participant_id' }); 
                
                if (compErr && compErr.code !== '23505') {
                    throw compErr;
                }

                // Redirect to thank you
                const slug = HubRouter.getSlug();
                window.location.href = `/${slug}/start-obrigado`;
                
            } catch(e) {
                console.error(e);
                showToast(e.message || 'Erro ao registrar.', 'error');
                btn.disabled = false;
                btn.textContent = isNewUserFlow ? 'Criar Cadastro e Concluir' : 'Registrar Conclusão';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
