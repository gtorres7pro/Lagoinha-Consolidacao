# ── Rate limiting zones (defined at http-level context via include) ──
# Note: limit_req_zone must be in the http{} block in Nginx.
# Coolify/Docker: define in /etc/nginx/conf.d/rate_limit.conf
# These location-level limit_req directives will work once the zone is defined.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers (H3 — Fase H) ────────────────────────────────
    # CSP: covers Supabase, Fonts, CDNs (Chart.js, QRCode, jsBarcode),
    #      Meta Embedded Signup, Evolution API and Supabase Realtime WS
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline'
                    cdn.jsdelivr.net
                    cdnjs.cloudflare.com
                    fonts.googleapis.com
                    staticxx.facebook.com
                    connect.facebook.net;
        style-src   'self' 'unsafe-inline'
                    cdnjs.cloudflare.com
                    fonts.googleapis.com
                    fonts.gstatic.com;
        font-src    fonts.gstatic.com data:;
        connect-src 'self'
                    https://uyseheucqikgcorrygzc.supabase.co
                    wss://uyseheucqikgcorrygzc.supabase.co
                    https://*.supabase.co
                    https://graph.facebook.com
                    https://www.facebook.com;
        frame-src   https://www.facebook.com
                    https://staticxx.facebook.com
                    https://www.youtube.com;
        img-src     'self' data: blob:
                    cdnjs.cloudflare.com
                    https://*.supabase.co
                    https://www.facebook.com;
        object-src  'none';
        base-uri    'self';
        report-uri  /csp-report;
    " always;

    # CSP violation logging (Fase J)
    location = /csp-report {
        access_log /var/log/nginx/csp_violations.log;
        return 204;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Slug-based workspace routing:
    # /orlando/login.html → /login.html
    location ~ ^/[^/]+/(.+)$ {
        try_files /$1 /404.html;
    }

    # Root — serve index.html (slug-aware redirect)
    location = / {
        try_files /index.html =404;
    }

    # Direct file access (fallback)
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Static assets — moderate cache with revalidation for JS/CSS
    location ~* \.(js|css)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        gzip_static on;
        etag on;
    }

    # Images and fonts — longer cache is safe
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 7d;
        add_header Cache-Control "public";
        gzip_static on;
    }

    # ── Block sensitive files (H-backup) ───────────────────────────────
    location ~* dashboard-backup\.html$ {
        deny all;
        return 404;
    }

    # Disable .git, hidden files, and config access
    location ~ /\.(git|env|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    # Block direct access to backend config files
    location ~* \.(json|yaml|yml|toml|ini|lock|sh)$ {
        deny all;
        return 404;
    }
}
