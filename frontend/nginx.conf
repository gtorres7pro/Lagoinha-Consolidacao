server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com fonts.gstatic.com; font-src fonts.gstatic.com data:; connect-src 'self' uyseheucqikgcorrygzc.supabase.co *.supabase.co; img-src 'self' data: blob: *.supabase.co;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Slug-based workspace routing:
    # /orlando/login.html → /login.html
    location ~ ^/[^/]+/(.+)$ {
        try_files /$1 /404.html;
    }

    # Root — serve index.html (slug-aware redirect)
    location = / {
        try_files /index.html =404;
    }

    # Direct file access (fallback)
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Disable .git access
    location ~ /\.git {
        deny all;
    }
}
