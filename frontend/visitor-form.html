<!DOCTYPE html>
<html lang="pt" class="public-form-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <title>Visitantes — Zelo</title>
    <link rel="stylesheet" href="/hub.css">
    <!-- Intl-Tel-Input CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
    <link rel="stylesheet" href="/public-form.css?v=20260502">
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f0f13;
            --bg-card: #15161d;
            --bg-input: #1b1c24;
            --border: rgba(255,255,255,0.10);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.58);
            --text-dim: rgba(255,255,255,0.42);
            --public-form-bg: #0f0f13;
            --public-form-surface-bg: #15161d;
            --public-form-input-bg: #1b1c24;
            --public-form-menu-bg: #111318;
            --public-form-accent: #60a5fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }

        body {
            background: var(--bg, #0f0f13);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }
        .container {
            background: var(--bg-card);
            width: 100%; max-width: 650px;
            border-radius: 28px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
            border: 1px solid var(--border);
            padding-bottom: 48px;
            animation: fadeInUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
        }
        .banner {
            width: 100%; height: 8px;
            background: linear-gradient(90deg, #60a5fa 0%, #3b82f6 50%, rgba(96,165,250,0.3) 100%);
        }
        .form-content { padding: 0 36px; margin-top: 32px; }
        @media (max-width: 500px) { .form-content { padding: 0 20px; } }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .logo-placeholder {
            font-weight: 700; font-size: 1rem;
            display: flex; align-items: center; gap: 10px;
            color: var(--text);
        }
        .logo-placeholder .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-placeholder .logo-icon svg { width: 16px; height: 16px; }
        .lang-select {
            padding: 7px 12px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text); font-size: 0.82rem; cursor: pointer; outline: none;
            font-family: var(--font); transition: border 0.2s; margin-left: 20px;
        }
        .lang-select:focus { border-color: #60a5fa; }
        h2 {
            font-size: 1.15rem; margin-bottom: 20px;
            font-weight: 700; color: var(--text); letter-spacing: -0.02em;
            display: flex; align-items: center; gap: 10px;
        }
        h2::before {
            content: ''; width: 3px; height: 18px;
            background: #60a5fa; border-radius: 2px;
            display: inline-block; flex-shrink: 0;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block; font-size: 0.8rem; font-weight: 600;
            margin-bottom: 7px; color: var(--text-muted); letter-spacing: 0.01em;
        }
        input[type="text"], input[type="email"],
        input[type="number"], input[type="tel"], select {
            width: 100%; padding: 13px 16px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text); font-family: var(--font); font-size: 0.9rem;
            outline: none; transition: border 0.2s, box-shadow 0.2s;
            -webkit-appearance: none; appearance: none;
        }
        input:focus, select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.12);
        }
        select option { background: #111; color: #fff; }
        .iti { width: 100%; display: block; }
        .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags.png");}
        @media (min-resolution: 2x) { .iti__flag {background-image: url("https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/img/flags@2x.png");}}
        .iti__country-list { background: #111; border: 1px solid var(--border); color: var(--text); }
        .iti__country:hover { background: rgba(255,255,255,0.06); }
        .iti__selected-flag { background: var(--bg-input) !important; border-right: 1px solid var(--border); }
        .iti__arrow { border-top-color: var(--text-muted); }
        .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        @media (max-width: 500px) { .radio-group { grid-template-columns: 1fr; } }
        .radio-option {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;
            cursor: pointer; transition: border 0.15s, background 0.15s;
            margin: 0; background: var(--bg-input); font-size: 0.85rem; color: var(--text);
        }
        .radio-option:hover { border-color: rgba(96,165,250,0.35); background: rgba(96,165,250,0.04); }
        .radio-option:has(input:checked) { border-color: #60a5fa; background: rgba(96,165,250,0.08); color: #60a5fa; font-weight: 600; }
        input[type="radio"] { accent-color: #60a5fa; width: 16px; height: 16px; flex-shrink: 0; }
        .btn-submit {
            position: relative;
            background: #60a5fa; color: #000;
            border: none; padding: 15px 28px; border-radius: 100px;
            font-size: 0.95rem; font-weight: 800; font-family: var(--font); width: 100%;
            cursor: pointer; margin-top: 28px; overflow: hidden;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-submit::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
            background-size: 200% 100%; background-position: 200% center;
            transition: background-position 0.5s;
        }
        .btn-submit:hover::after { background-position: -200% center; }
        .btn-submit:hover { background: #3b82f6; box-shadow: 0 4px 24px rgba(96,165,250,0.3); transform: translateY(-1px); }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit svg { width: 16px; height: 16px; transition: transform 0.2s; }
        .btn-submit:hover svg { transform: translateX(3px); }
        .success-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5,5,5,0.96); backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 40px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; z-index: 10000;
        }
        .success-overlay.active { opacity: 1; pointer-events: auto; }
        .success-overlay h3 { font-size: 1.8rem; margin-bottom: 10px; color: #60a5fa; font-weight: 900; letter-spacing: -0.03em; }
        .success-overlay p { color: var(--text-muted); margin-bottom: 8px; font-size: 0.95rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } .container { max-width: 100%; } }
    </style>
</head>
<body>

    <!-- Success Screen -->

        <p data-i18n="success_sub">Seus dados foram enviados com sucesso.</p>
        <!-- G1: Welcome-back note (hidden by default, shown when email already exists) -->
        <p id="success-welcome-note" style="display:none; font-size:.85rem; color:#64dc96; margin-top:6px; background:rgba(100,220,150,.08); padding:8px 14px; border-radius:8px; border:1px solid rgba(100,220,150,.2);">Bem-vindo(a) de volta! Sua nova visita foi registrada no seu perfil existente.</p>
        <p style="font-weight: 600; margin-top: 15px;"><span data-i18n="redirecting">Redirecionando em</span> <span id="countdown">3</span>...</p>

                    </select>

            <div class="form-group">

                    <option value="Casado(a)" data-i18n="married" data-val-i18n="married">Casado(a)</option>
                    <option value="Divorciado(a)" data-i18n="divorced" data-val-i18n="divorced">Divorciado(a)</option>
                    <option value="Viúvo(a)" data-i18n="widowed" data-val-i18n="widowed">Viúvo(a)</option>
                </select>
            </div>

                    <input type="tel" id="phone" required>

                <div class="form-group">

        function changeLanguage() {
            try {
                const lang = document.getElementById('languageSelector').value;
                const t = translations[lang];

                // 1. Text Labels (Robust loop, never crashes)
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (t[key]) {
                        el.innerText = t[key];
                    }
                });

                // 2. Values (for dropdowns and radios to save english to db)
                document.querySelectorAll('[data-val-i18n]').forEach(el => {
                    const key = el.getAttribute('data-val-i18n');
                    if (t[key]) {
                        el.value = t[key];
                    }
                });
                
                // 3. Placeholders
                const stateText = document.getElementById('state-text');
                if(stateText) stateText.placeholder = t.state_text_ph;
                
            } catch(e) {
                console.error("Translation Engine Warning: ", e);
            }
        }
        
        // -- Country Logic --
        function handleCountryChange() {
            try {
                const country = document.getElementById('country').value;
                const stateText = document.getElementById('state-text');
                const stateUS = document.getElementById('state-us');
                const stateBR = document.getElementById('state-br');
                const statePT = document.getElementById('state-pt');
                const stateCA = document.getElementById('state-ca');

                // Hide all
                [stateText, stateUS, stateBR, statePT, stateCA].forEach(el => {
                    if(el) { el.style.display = 'none'; el.required = false; el.value = ""; }
                });

                if (country === 'US') { stateUS.style.display = 'block'; stateUS.required = true; }
                else if (country === 'BR') { stateBR.style.display = 'block'; stateBR.required = true; }
                else if (country === 'PT') { statePT.style.display = 'block'; statePT.required = true; }
                else if (country === 'CA') { stateCA.style.display = 'block'; stateCA.required = true; }
                else { stateText.style.display = 'block'; stateText.required = true; }
            } catch (e) { console.error("Country Logic Warning: ", e); }
        }

        // Apply on Start
        window.addEventListener('DOMContentLoaded', async () => {
             try {
                const workspaceObj = await window.HubRouter?.getWorkspace();
                if (workspaceObj && workspaceObj.name) {
                    translations.pt.church_name = workspaceObj.name;
                    translations.en.church_name = workspaceObj.name;
                    translations.es.church_name = workspaceObj.name;
                }
             } catch (e) {
                console.error("Failed to load workspace dynamically: ", e);
             }

            handleCountryChange(); 
            changeLanguage();
            
            // Get slug for initial country detection (extract from paths like /braga/visitor-form.html)
            const parts = window.location.pathname.split('/').filter(Boolean);
            const sys = ['login.html', 'dashboard.html', 'consolida-form.html', 'crie-inscricao.html', 'visitor-form.html'];
            const slug = parts.find(p => !sys.includes(p))?.toLowerCase() || '';
            
            let initialCountry = "us"; // USA default
            if (['braga', 'almada', 'lisboa', 'porto', 'coimbra', 'algarve'].includes(slug)) initialCountry = "pt";
            else if (['rio-de-janeiro', 'brasil', 'niteroi', 'saopaulo', 'sp', 'rj'].includes(slug)) initialCountry = "br";
            else if (['canada', 'toronto', 'vancouver'].includes(slug)) initialCountry = "ca";

            // International Phone Setup (Waits for DOM to load to prevent CSS clashing)
            window.phoneInput = window.intlTelInput(document.querySelector("#phone"), {
                initialCountry: initialCountry,
                preferredCountries: ["us", "br", "pt", "ca"],
                separateDialCode: true,
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/utils.js",
            });
        });

        // -- Submit Logic --
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const lang = document.getElementById('languageSelector').value;
            const originalText = btn.innerHTML;
            btn.innerHTML = '...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            try {
                // Initialize Supabase
                const supabase = window.supabase.createClient(
                    'https://uyseheucqikgcorrygzc.supabase.co', 
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI'
                );

                // Resolve workspace_id from URL slug (zelo.7prolabs.com/[slug]/form-visitantes)
                const workspaceObj = await window.HubRouter.getWorkspace();
                const workspaceId = workspaceObj ? workspaceObj.id : null;
                const workspaceName = workspaceObj ? workspaceObj.name : 'Unknown';
                if (!workspaceId) throw new Error('Workspace não encontrado. Verifique o link do formulário.');

                // Fetch the full international phone number mapped by the plugin
                const fullPhoneStr = window.phoneInput.getNumber(); 

                // Resolve which State input was used
                let finalState = "";
                const country = document.getElementById('country').value;
                if(country === 'US') finalState = document.getElementById('state-us').value;
                else if (country === 'BR') finalState = document.getElementById('state-br').value;
                else if (country === 'PT') finalState = document.getElementById('state-pt').value;
                else if (country === 'CA') finalState = document.getElementById('state-ca').value;
                else finalState = document.getElementById('state-text').value;

                // Format Full Address string
                const addressStr = `${document.getElementById('address').value}, ${document.getElementById('apt').value || ''} - ${document.getElementById('city').value}, ${finalState} - ${country} (${document.getElementById('zip').value})`;

                const batizadoVal = document.querySelector('input[name="baptized"]:checked');
                const gcVal = document.querySelector('input[name="gc"]:checked');

                const leadData = {
                    workspace_id: workspaceId, // Dynamically resolved from URL slug
                    name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                    phone: fullPhoneStr,
                    email: document.getElementById('email').value,
                    pais: country,
                    cidade: document.getElementById('city').value,
                    estado: finalState,
                    idade: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
                    estado_civil: document.getElementById('maritalStatus').value,
                    sexo: document.getElementById('gender').value,
                    batizado: batizadoVal ? batizadoVal.value : 'Não Informado',
                    culto: document.getElementById('culto') ? document.getElementById('culto').value : 'Não Informado',
                    gc_status: gcVal ? gcVal.value : 'Não Informado',
                    preferred_language: lang,
                    type: "visitor",
                    source: "visitante-form",
                    tasks: [{"task_name": "Welcome Message Required", "status": "pending", "assigned_to": "ai"}]
                };

                // ── G1: Email Duplicate Check ──
                // Note: anon users cannot SELECT from 'leads' (RLS blocks it),
                // so the duplicate check is skipped for public forms.
                // The DB has no unique constraint on email, so duplicates are allowed.
                // ── End G1 ──────────────────────────────────────────────────────

                // IMPORTANT: Do NOT chain .select() here — the anon role has no
                // SELECT permission on 'leads' (RLS policy requires auth.uid()),
                // so .select() would fail even though the INSERT succeeded.
                const { error } = await supabase.from('leads').insert([leadData]);

                if (error) throw error;

                // 🔔 Fire & Forget: Notify webhook (Google Sheets)
                fetch('https://script.google.com/macros/s/AKfycbwCNOGzzEn1FVN5v2svzthrXOE-iBxbZcVNhU0d-epGCPYiJF4RNudJdS38HfOndfft/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        formUsed: 'Visitantes',
                        date: new Date().toISOString(),
                        workspace: workspaceName,
                        workspaceId: workspaceId,
                        name: leadData.name,
                        whatsapp: leadData.phone,
                        email: leadData.email
                    })
                }).catch(() => {});

                // 📊 Audit log — fire and forget (also fails for anon, but harmless)
                supabase.from('audit_logs').insert({
                    workspace_id: workspaceId,
                    user_id: null,
                    user_email: null,
                    action: 'lead.visitor_form_submitted',
                    description: `Form de Visitante preenchido — ${leadData.name}`,
                    category: 'forms',
                    entity_type: 'lead',
                    entity_id: null,
                    metadata: { lead_name: leadData.name, workspace: workspaceName }
                }).then(() => {}).catch(() => {});

                window.scrollTo({ top: 0, behavior: "smooth" });
                document.getElementById('successScreen').classList.add('active');
                let count = 3;
                const interval = setInterval(() => {
                    count--;
                    document.getElementById('countdown').innerText = count;
                    if(count <= 0) {
                        clearInterval(interval);
                        window.location.href = "success.html";
                    }
                }, 1000);

            } catch (error) {
                console.error("Error saving to DB:", error);
                alert("Server error. Please try again.");
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
