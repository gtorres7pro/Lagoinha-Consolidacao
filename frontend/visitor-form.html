<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Form - Lagoinha</title>
    <!-- Using Inter font for that clean, modern geometric look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F8F9FA; /* Soft off-white */
            --card-bg: #FFFFFF;
            --text-main: #111111; /* Deep Black */
            --text-muted: #666666;
            --accent-color: #FFD700; /* Vibrant Yellow */
            --accent-hover: #E6C200;
            --border-color: #E2E8F0;
            --input-bg: #F8F9FA;
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            
            /* Dynamic workspace config that would be injected by JS later */
            --dynamic-redirect-url: "https://www.lagoinhaorlandochurch.com";
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* Top Header & Language Selector */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-placeholder {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-placeholder span {
            color: var(--accent-color);
        }

        .lang-select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: border 0.2s;
        }
        .lang-select:focus {
            border-color: var(--text-main);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"], input[type="email"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: #CCC;
        }

        input[type="radio"] {
            accent-color: var(--text-main);
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: var(--text-main);
            border: none;
            padding: 16px 24px;
            border-radius: 100px; /* Pill shape */
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        /* Success screen overlay */
        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .success-overlay h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .success-overlay p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Multi-column layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 500px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 24px;
            }
        }
    </style>
</head>

                        <option value="F" id="opt-female">Feminino</option>

            </div>

            <div class="form-group">

                <select id="maritalStatus" required>

                    <option value="married" id="opt-married">Casado(a)</option>
                    <option value="divorced" id="opt-divorced">Divorciado(a)</option>
                    <option value="widowed" id="opt-widowed">Viúvo(a)</option>
                </select>
            </div>

            <h2 id="txt-section-contact" style="margin-top: 40px;">Contato e Residência</h2>

            <div class="grid-2">
                <div class="form-group">
                    <label id="lbl-city">Cidade *</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label id="lbl-state">Estado *</label>
                    <input type="text" id="state" required>
                </div>
            </div>

            <div class="form-group">
                <label id="lbl-country">País *</label>
                <div class="radio-group" id="country-group">
                    <label class="radio-option"><input type="radio" name="country" value="EUA" required> <span id="opt-usa">EUA</span></label>
                    <label class="radio-option"><input type="radio" name="country" value="Brasil"> <span id="opt-br">Brasil</span></label>
                    <label class="radio-option"><input type="radio" name="country" value="Other"> <span id="opt-other">Outro</span></label>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label id="lbl-phone">Telefone *</label>
                    <input type="text" id="phone" required>
                </div>
                <div class="form-group">
                    <label id="lbl-email">E-mail *</label>
                    <input type="email" id="email" required>
                </div>
            </div>

            <h2 id="txt-section-additional" style="margin-top: 40px;">Informação Adicional</h2>

            <div class="form-group">
                <label id="lbl-baptized" style="font-size: 1rem; font-weight: 600;">Você é Batizado? *</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="baptized" value="Católico" required> <span id="opt-bap-catholic">Católico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Evangélico"> <span id="opt-bap-christian">Evangélico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Quero me batizar"> <span id="opt-bap-want">Quero me Batizar</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Não"> <span id="opt-bap-no">Não</span></label>
                </div>
            </div>

            <div class="form-group" style="margin-top: 24px;">
                <label id="lbl-gc" style="font-size: 1rem; font-weight: 600;">Você participa de um GC (Small Group)? *</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="gc" value="Sim" required> <span id="opt-gc-yes">Sim</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Quero participar"> <span id="opt-gc-want">Quero participar</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Não"> <span id="opt-gc-no">Não</span></label>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">Enviar <span style="font-size: 1.2rem;">→</span></button>
        </form>

        async function handleFormSubmit(event) {
            event.preventDefault(); // Prevent standard POST
            
            const btn = document.getElementById('btn-submit');
            btn.innerHTML = 'Enviando...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            const lang = document.getElementById('languageSelector').value;

            try {
                // Determine if they are a 'saved' or 'visitor' based on form type (this is the visitor form)

                // Construct our Data object based on the gemini.md schema

                    workspace_id: liveWorkspaceId,
                    name: `${firstName} ${lastName}`,
                    phone: phone,
                    preferred_language: lang,
                    type: leadType,
                    tasks: [{"task_name": "Welcome Message Sent", "status": "pending", "assigned_to": "ai"}]
                };

                // Insert into Real Supabase Database!
                const { data, error } = await supabase
                    .from('leads')
                    .insert([leadData])
                    .select();
                
                if (error) throw error;
                
                console.log("Success! Lead inserted:", data);

                // Show Success Overlay
                document.getElementById('successScreen').classList.add('active');
                
                // Redirect Countdown
                let count = 3;
                const countEl = document.getElementById('countdown');
                const interval = setInterval(() => {
                    count--;
                    if(countEl) countEl.innerText = count;
                    
                    if(count <= 0) {
                        clearInterval(interval);
                        // Redirect to standard Workspace URL
                        window.location.href = workspaceConfig.redirect_url;
                    }
                }, 1000);

                btn.disabled = false;
