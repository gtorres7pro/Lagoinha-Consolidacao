<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Form - Lagoinha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Intl-Tel-Input CSS for Phone Formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.css">
    
    <style>
        :root {
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-main: #111111;
            --text-muted: #666666;
            --accent-color: #FFD700;
            --accent-hover: #E6C200;
            --border-color: #E2E8F0;
            --input-bg: #F8F9FA;
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            
            --dynamic-redirect-url: "https://www.lagoinhaorlandochurch.com";
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-placeholder {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-placeholder span {
            color: var(--accent-color);
        }

        .lang-select {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            transition: border 0.2s;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            font-weight: 600;
            color: var(--text-main);
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        input[type="text"], input[type="email"], input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--input-bg);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
            background-color: #FFF;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }

        /* Fix intl-tel-input width inside our form */
        .iti {
            width: 100%;
            display: block;
        }

        .radio-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .radio-group {
                grid-template-columns: 1fr;
            }
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0;
        }

        .radio-option:hover {
            border-color: #CCC;
            background-color: #fcfcfc;
        }

        input[type="radio"] {
            accent-color: var(--text-main);
            width: 18px;
            height: 18px;
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: var(--text-main);
            border: none;
            padding: 16px 24px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
        }

        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .success-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .success-overlay h3 { font-size: 2rem; margin-bottom: 10px; color: var(--text-main); }
        .success-overlay p { color: var(--text-muted); margin-bottom: 20px; font-size: 1.1rem; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 500px) {
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 24px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Success Screen -->
        <div class="success-overlay" id="successScreen">
            <h3 data-i18n="success_title">Obrigado!</h3>
            <p data-i18n="success_sub">Seus dados foram enviados com sucesso.</p>
            <p style="font-weight: 600;"><span data-i18n="redirecting">Redirecionando em</span> <span id="countdown">3</span>...</p>
        </div>

        <div class="header">
            <div class="logo-placeholder">
                <span>⚡</span> <div data-i18n="church_name">Lagoinha Orlando</div>
            </div>
            <select class="lang-select" id="languageSelector" onchange="changeLanguage()">
                <option value="pt" selected>Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
        </div>

        <h2 data-i18n="personal_info">Informações Pessoais</h2>
        
        <form id="visitorForm" onsubmit="handleFormSubmit(event)">
            
            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="first_name">Primeiro Nome *</label>
                    <input type="text" id="firstName" required>
                </div>
                <div class="form-group">
                    <label data-i18n="last_name">Sobrenome *</label>
                    <input type="text" id="lastName" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="age">Idade *</label>
                    <input type="number" id="age" required min="0">
                </div>
                <div class="form-group">
                    <label data-i18n="gender">Sexo *</label>
                    <select id="gender" required>
                        <option value="" disabled selected data-i18n="gender_select">Selecione...</option>
                        <option value="Masculino" data-i18n="gender_m">Masculino</option>
                        <option value="Feminino" data-i18n="gender_f">Feminino</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="marital">Estado Civil *</label>
                <select id="maritalStatus" required>
                    <option value="" disabled selected data-i18n="marital_select">Selecione...</option>
                    <option value="Solteiro(a)" data-i18n="single">Solteiro(a)</option>
                    <option value="Casado(a)" data-i18n="married">Casado(a)</option>
                    <option value="Divorciado(a)" data-i18n="divorced">Divorciado(a)</option>
                    <option value="Viúvo(a)" data-i18n="widowed">Viúvo(a)</option>
                </select>
            </div>

            <h2 data-i18n="contact_info" style="margin-top: 20px;">Contato e Residência</h2>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="phone">Telefone (WhatsApp) *</label>
                    <!-- intl-tel-input will inject the country flag dropdown here -->
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label data-i18n="email">E-mail *</label>
                    <input type="email" id="email" required>
                </div>
            </div>

            <div class="form-group">
                <label data-i18n="country">País de Residência *</label>
                <select id="country" required onchange="handleCountryChange()">
                    <option value="" disabled selected data-i18n="country_select">Selecione o País...</option>
                    <option value="US" data-i18n="country_us">Estados Unidos</option>
                    <option value="BR" data-i18n="country_br">Brasil</option>
                    <option value="OTHER" data-i18n="country_other">Outro...</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label data-i18n="state">Estado *</label>
                    <!-- Wrapper for dynamics states -->
                    <div id="state-wrapper">
                        <!-- Default text input for "Other" countries or startup -->
                        <input type="text" id="state-text" style="display: none;">
                        
                        <!-- USA States Dropdown -->
                        <select id="state-us" style="display: none;">
                            <option value="" disabled selected data-i18n="state_select">Selecione o Estado...</option>
                        </select>
                        
                        <!-- Brazil States Dropdown -->
                        <select id="state-br" style="display: none;">
                            <option value="" disabled selected data-i18n="state_select">Selecione o Estado...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label data-i18n="city">Cidade *</label>
                    <input type="text" id="city" required>
                </div>
            </div>

            <h2 data-i18n="additional_info" style="margin-top: 20px;">Informação Adicional</h2>

            <div class="form-group">
                <label data-i18n="baptized">Você é Batizado? *</label>
                <div class="radio-group" id="radio-baptized">
                    <label class="radio-option"><input type="radio" name="baptized" value="Católico" required> <span data-i18n="bap_catholic">Católico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Evangélico"> <span data-i18n="bap_christian">Evangélico</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Quero me batizar"> <span data-i18n="bap_want">Quero me Batizar</span></label>
                    <label class="radio-option"><input type="radio" name="baptized" value="Não"> <span data-i18n="bap_no">Não</span></label>
                </div>
            </div>

            <div class="form-group" style="margin-top: 24px;">
                <label data-i18n="gc">Você participa de um GC (Small Group)? *</label>
                <div class="radio-group" id="radio-gc">
                    <label class="radio-option"><input type="radio" name="gc" value="Sim" required> <span data-i18n="gc_yes">Sim</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Quero participar"> <span data-i18n="gc_want">Quero participar</span></label>
                    <label class="radio-option"><input type="radio" name="gc" value="Não"> <span data-i18n="gc_no">Não</span></label>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit"><span data-i18n="submit">Enviar Formulário</span> <span>→</span></button>
        </form>
    </div>

    <!-- Scripts -->

            const country = document.getElementById('country').value;

                el.style.display = 'none';
                el.required = false;
                el.value = ""; // clear value when swapped
            });

            if (country === 'US') {
                stateUS.style.display = 'block';
                stateUS.required = true;
            } else if (country === 'BR') {
                stateBR.style.display = 'block';

        function changeLanguage() {
            const lang = document.getElementById('languageSelector').value;
            const t = translations[lang];

            // 1. Update all inner texts via data-attribute
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.innerText = t[key];
                }
            });

            // 2. Also update the underlying "values" of the radio buttons and selects so the database records English answers!
            // Radio: Baptized
            const bapRadios = document.querySelectorAll('input[name="baptized"]');
            bapRadios[0].value = t.bap_catholic;
            bapRadios[1].value = t.bap_christian;
            bapRadios[2].value = t.bap_want;
            bapRadios[3].value = t.bap_no;

            // Radio: GC
            const gcRadios = document.querySelectorAll('input[name="gc"]');
            gcRadios[0].value = t.gc_yes;
            gcRadios[1].value = t.gc_want;
            gcRadios[2].value = t.gc_no;

            // Select: Marital Status
            const marSelect = document.getElementById('maritalStatus');
            marSelect.options[1].value = t.single;
            marSelect.options[2].value = t.married;
            marSelect.options[3].value = t.divorced;
            marSelect.options[4].value = t.widowed;

            // Select: Gender
            const genSelect = document.getElementById('gender');
            genSelect.options[1].value = t.gender_m;
            genSelect.options[2].value = t.gender_f;
            
            // Re-eval placeholder if country is Other
            const stateText = document.getElementById('state-text');
            if(stateText.style.display !== 'none') {
                stateText.placeholder = t.state_text_ph;
            }
        }
        
        // Initial defaults
        handleCountryChange(); 
        changeLanguage();


        // Form Submit Handler
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const btn = document.getElementById('btnSubmit');
            const lang = document.getElementById('languageSelector').value;
            const originalText = btn.innerHTML;
            btn.innerHTML = '...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            try {
                // Fetch the full international phone number mapped by the plugin
                const fullPhoneStr = phoneInput.getNumber(); 

                // Resolve which State input was used
                let finalState = "";
                const country = document.getElementById('country').value;
                if(country === 'US') finalState = document.getElementById('state-us').value;
                else if (country === 'BR') finalState = document.getElementById('state-br').value;
                else finalState = document.getElementById('state-text').value;

                const leadData = {
                    workspace_id: '00000000-0000-0000-0000-000000000000',
                    name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
                    phone: fullPhoneStr,
                    preferred_language: lang,
                    type: "visitor",
                    tasks: [{"task_name": "Welcome Message Required", "status": "pending", "assigned_to": "ai"}]
                };

                const { data, error } = await supabase
                    .from('leads')
                    .insert([leadData])
                    .select();
                
                if (error) throw error;
                
                // Show Success Screen
                document.getElementById('successScreen').classList.add('active');
                
                let count = 3;
                const countEl = document.getElementById('countdown');
                const interval = setInterval(() => {
                    count--;
                    if(countEl) countEl.innerText = count;
                    if(count <= 0) {
                        clearInterval(interval);
                        window.location.href = "https://www.lagoinhaorlandochurch.com";
                    }
                }, 1000);

            } catch (error) {
                console.error("Error saving to DB:", error);
                alert("Server error. Please try again.");
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
