<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Lagoinha HUB</title>
    <link rel="stylesheet" href="/hub.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* Icon Badge */
        .login-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 8px 32px rgba(251,191,36,0.3), 0 0 0 1px rgba(251,191,36,0.15);
            transition: transform 0.2s;
        }
        .login-icon:hover { transform: scale(1.05) rotate(3deg); }

        /* Headline */
        .login-headline { text-align: center; }
        .login-headline h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1.05;
        }
        .login-headline p {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            margin-top: 6px;
        }

        /* Card */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 36px 32px;
            width: 100%;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Password toggle */
        .pw-toggle {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--text-dim); cursor: pointer;
            font-size: 1rem; padding: 4px;
            border-radius: 6px;
            transition: color 0.15s;
        }
        .pw-toggle:hover { color: var(--text-label); }

        .forgot-btn {
            background: none; border: none;
            color: var(--accent-dark);
            font-family: var(--font);
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: color 0.15s;
            text-decoration: none;
        }
        .forgot-btn:hover { color: var(--accent); }

        .footer-note {
            font-size: 0.72rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* Workspace indicator */
        .workspace-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(251,191,36,0.06);
            border: 1px solid rgba(251,191,36,0.15);
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .workspace-indicator .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 22px; }
            .login-headline h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- Ambient glow -->
    <div class="hub-glow"></div>

    <div class="login-container">
        <!-- Icon -->
        <div class="login-icon">✦</div>

        <!-- Headline -->
        <div class="login-headline">
            <h1>Bem-vindo<br>de volta</h1>
            <p>Plataforma de Consolidação Lagoinha</p>
        </div>

        <!-- Workspace badge (filled by JS) -->
        <div class="workspace-indicator" id="workspace-badge" style="display:none;">
            <span class="dot"></span>
            <span id="workspace-name">Carregando...</span>
        </div>

        <!-- Card -->
        <div class="login-card">
            <!-- Email -->
            <div class="field-group">
                <label class="hub-label" for="email">E-mail</label>
                <div class="hub-input-wrap">
                    <span class="hub-input-icon">✉</span>
                    <input class="hub-input" type="email" id="email"
                        placeholder="seu@email.com"
                        autocomplete="email" autofocus>
                </div>
            </div>

            <!-- Password -->
            <div class="field-group">
                <label class="hub-label" for="password">Senha</label>
                <div class="hub-input-wrap">
                    <span class="hub-input-icon">🔒</span>
                    <input class="hub-input" type="password" id="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        style="padding-right: 44px;">
                    <button class="pw-toggle" type="button" onclick="togglePw()" aria-label="Mostrar senha">👁</button>
                </div>
            </div>

            <!-- Error -->
            <div class="hub-error" id="error-msg"></div>

            <!-- Submit -->
            <button class="hub-btn" id="login-btn" onclick="doLogin()">
                Entrar
            </button>

            <button class="forgot-btn" onclick="goForgot()">Esqueci minha senha</button>
        </div>

        <p class="footer-note">Acesso restrito à equipe pastoral</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://uyseheucqikgcorrygzc.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5c2VoZXVjcWlrZ2NvcnJ5Z3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDcxMzIsImV4cCI6MjA4OTQyMzEzMn0._O9Wb2duZKRo9kSU_K_9sEl-7wEeQlEeR1GBuCSRVdI';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

        // Extract workspace slug from URL: hub.7pro.tech/{slug}/login.html
        const _parts = window.location.pathname.split('/').filter(Boolean);
        const _slug = _parts[0] || 'orlando';

        // Show workspace badge
        async function loadWorkspaceName() {
            const badge = document.getElementById('workspace-badge');
            const nameEl = document.getElementById('workspace-name');
            try {
                const { data } = await sb.from('workspaces').select('name').eq('slug', _slug).single();
                if (data?.name) {
                    nameEl.textContent = data.name;
                    badge.style.display = 'flex';
                }
            } catch (e) { /* silently skip */ }
        }
        loadWorkspaceName();

        // If already logged in, redirect to /{slug}/dashboard.html
        sb.auth.getSession().then(({ data }) => {
            if (data.session) window.location.replace('/' + _slug + '/dashboard.html');
        });

        function togglePw() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function goForgot() {
            window.location.href = '/' + _slug + '/forgot-password.html';
        }

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const pass  = document.getElementById('password').value;
            const btn   = document.getElementById('login-btn');
            const err   = document.getElementById('error-msg');

            if (!email || !pass) { showError('Por favor preencha email e senha.'); return; }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            err.classList.remove('show');

            const { error } = await sb.auth.signInWithPassword({ email, password: pass });

            if (error) {
                showError(error.message === 'Invalid login credentials'
                    ? '❌ Email ou senha incorretos.'
                    : '❌ ' + error.message);
                btn.disabled = false;
                btn.textContent = 'Entrar';
            } else {
                window.location.replace('/' + _slug + '/dashboard.html');
            }
        }

        function showError(msg) {
            const e = document.getElementById('error-msg');
            e.textContent = msg;
            e.classList.add('show');
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    </script>
</body>
</html>
